<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inspo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #181818;
      --surface2: #222222;
      --border: #2a2a2a;
      --border-hover: #404040;
      --text: #f0f0f0;
      --text-muted: #666;
      --text-dim: #3a3a3a;
      --accent: #7c6fff;
      --accent-hover: #9589ff;
      --danger: #ff5c5c;
      --card-w: 360px;
      --card-preview-h: 220px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: rgba(14,14,14,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      z-index: 100;
    }

    .logo {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      flex-shrink: 0;
    }

    .logo span { color: var(--accent); }

    .boards-scroll {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 4px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .boards-scroll::-webkit-scrollbar { display: none; }

    .board-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 400;
      color: var(--text-muted);
      cursor: pointer;
      white-space: nowrap;
      border: 1px solid transparent;
      background: none;
      transition: all 0.15s;
      font-family: 'Inter', sans-serif;
    }

    .board-tab:hover { color: var(--text); background: var(--surface); }
    .board-tab.active { color: var(--text); background: var(--surface2); border-color: var(--border); }

    .tab-count {
      font-size: 11px;
      color: var(--text-dim);
      background: var(--surface);
      border-radius: 10px;
      padding: 1px 6px;
    }

    .board-tab.active .tab-count { background: var(--border); color: var(--text-muted); }

    .tab-delete {
      opacity: 0;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 15px;
      line-height: 1;
      padding-left: 2px;
      transition: opacity 0.1s, color 0.1s;
    }

    .board-tab:hover .tab-delete { opacity: 1; }
    .tab-delete:hover { color: var(--danger) !important; }

    .btn-new-board {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 13px;
      color: var(--text-muted);
      background: none;
      border: 1px dashed var(--border);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      flex-shrink: 0;
      font-family: 'Inter', sans-serif;
    }

    .btn-new-board:hover { color: var(--text); border-color: var(--border-hover); }

    .btn-add-url {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
      font-family: 'Inter', sans-serif;
    }

    .btn-add-url:hover { background: var(--accent-hover); }

    /* ── Main ── */
    .main {
      padding: 80px 24px 48px;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 14px;
      text-align: center;
    }

    .empty-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }

    .empty-state h2 { font-size: 17px; font-weight: 500; }

    .empty-state p {
      font-size: 14px;
      color: var(--text-muted);
      max-width: 300px;
      line-height: 1.6;
    }

    .btn-empty-add {
      margin-top: 6px;
      padding: 9px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      font-family: 'Inter', sans-serif;
    }

    .btn-empty-add:hover { background: var(--accent-hover); }

    /* ── Grid ── */
    .grid {
      columns: var(--card-w) auto;
      gap: 16px;
    }

    /* ── Card ── */
    .card {
      break-inside: avoid;
      margin-bottom: 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      position: relative;
    }

    .card:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    /* ── Preview ── */
    .card-preview {
      width: 100%;
      height: var(--card-preview-h);
      overflow: hidden;
      position: relative;
      background: var(--surface2);
    }

    .card-preview img.screenshot {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
      display: block;
      transition: opacity 0.3s;
    }

    /* Shimmer loading */
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position: 600px 0; }
    }

    .preview-shimmer {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, var(--surface2) 25%, #2a2a2a 50%, var(--surface2) 75%);
      background-size: 1200px 100%;
      animation: shimmer 1.6s infinite;
    }

    /* Fallback */
    .preview-fallback {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .fallback-globe {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .fallback-domain {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── Card footer ── */
    .card-footer {
      padding: 11px 13px;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .card-favicon {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      flex-shrink: 0;
      object-fit: contain;
    }

    .card-info { flex: 1; min-width: 0; }

    .card-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-domain {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .card:hover .card-actions { opacity: 1; }

    .card-action-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .card-action-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border-hover); }
    .card-action-btn.delete:hover { background: rgba(255,92,92,0.1); color: var(--danger); border-color: rgba(255,92,92,0.3); }

    .card-notes {
      padding: 0 13px 12px;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.55;
    }

    /* ── Add modal ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-backdrop.visible { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      width: 100%;
      max-width: 460px;
      transform: translateY(10px);
      transition: transform 0.2s;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    }

    .modal-backdrop.visible .modal { transform: translateY(0); }

    .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 18px; }

    .modal-field { margin-bottom: 13px; }

    .modal-field label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 500;
    }

    .modal-field label span { color: var(--text-dim); font-weight: 400; }

    .modal-field input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.15s;
    }

    .modal-field input:focus { border-color: var(--accent); }
    .modal-field input::placeholder { color: #333; }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    .btn-cancel {
      padding: 8px 16px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
    }

    .btn-cancel:hover { border-color: var(--border-hover); color: var(--text); }

    .btn-submit {
      padding: 8px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 0.15s;
    }

    .btn-submit:hover { background: var(--accent-hover); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Full preview modal ── */
    .preview-modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(12px);
      z-index: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      gap: 20px;
    }

    .preview-modal-backdrop.visible { opacity: 1; pointer-events: all; }

    .preview-modal-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 90%;
      max-width: 1100px;
    }

    .preview-modal-url {
      flex: 1;
      font-size: 13px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-visit-full {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      text-decoration: none;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .btn-visit-full:hover { background: var(--accent-hover); }

    .preview-modal-close {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .preview-modal-close:hover { color: var(--text); border-color: var(--border-hover); }

    .preview-modal-img-wrap {
      width: 90%;
      max-width: 1100px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface2);
      max-height: 80vh;
      overflow-y: auto;
    }

    .preview-modal-img-wrap img {
      width: 100%;
      display: block;
    }

    .preview-modal-loading {
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 60px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<header class="header">
  <div class="logo">Ins<span>p</span>o</div>
  <div class="boards-scroll" id="boardsScroll"></div>
  <button class="btn-new-board" onclick="newBoard()">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    New board
  </button>
  <button class="btn-add-url" onclick="openAddModal()">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
    Add site
  </button>
</header>

<main class="main" id="main"></main>

<!-- Add URL Modal -->
<div class="modal-backdrop" id="addModal">
  <div class="modal">
    <div class="modal-title">Add a site</div>
    <div class="modal-field">
      <label>URL</label>
      <input type="url" id="urlInput" placeholder="https://example.com" autocomplete="off" spellcheck="false">
    </div>
    <div class="modal-field">
      <label>Title <span>(optional — auto-detected)</span></label>
      <input type="text" id="titleInput" placeholder="Leave blank to auto-detect">
    </div>
    <div class="modal-field">
      <label>Notes <span>(optional)</span></label>
      <input type="text" id="notesInput" placeholder="What do you like about this?">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>
      <button class="btn-submit" id="submitBtn" onclick="addSite()">Add site</button>
    </div>
  </div>
</div>

<!-- Full Preview Modal -->
<div class="preview-modal-backdrop" id="previewModal" onclick="handlePreviewBackdropClick(event)">
  <div class="preview-modal-toolbar">
    <span class="preview-modal-url" id="previewUrlLabel"></span>
    <a class="btn-visit-full" id="previewVisitBtn" href="#" target="_blank" rel="noopener">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M5 2H2a1 1 0 00-1 1v7a1 1 0 001 1h7a1 1 0 001-1V7M8 1h3m0 0v3m0-3L5 7" stroke="white" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Visit site
    </a>
    <button class="preview-modal-close" onclick="closePreviewModal()">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
  </div>
  <div class="preview-modal-img-wrap" id="previewImgWrap">
    <div class="preview-modal-loading" id="previewLoading">
      <div class="spinner"></div>
      Generating preview…
    </div>
  </div>
</div>

<script>
  // ── Helpers ──
  function uid() { return Math.random().toString(36).slice(2, 10); }
  function getDomain(url) {
    try { return new URL(url).hostname.replace('www.', ''); } catch { return url; }
  }
  function screenshotUrl(url, w = 1280, h = 800) {
    return `https://api.microlink.io?url=${encodeURIComponent(url)}&screenshot=true&meta=false&embed=screenshot.url&waitForTimeout=1500&type=jpeg&overlay.browser=dark&viewport.width=${w}&viewport.height=${h}`;
  }
  function faviconUrl(url) {
    return `https://www.google.com/s2/favicons?domain=${getDomain(url)}&sz=32`;
  }

  // ── State ──
  let state = JSON.parse(localStorage.getItem('inspo-v2') || 'null') || {
    boards: [{ id: uid(), name: 'Inspiration', sites: [] }],
    activeBoard: null
  };
  if (!state.activeBoard) state.activeBoard = state.boards[0].id;

  function save() { localStorage.setItem('inspo-v2', JSON.stringify(state)); }
  function activeBoard() { return state.boards.find(b => b.id === state.activeBoard); }

  // ── Render boards ──
  function renderBoards() {
    document.getElementById('boardsScroll').innerHTML = state.boards.map(b => `
      <button class="board-tab ${b.id === state.activeBoard ? 'active' : ''}" onclick="switchBoard('${b.id}')">
        <span class="tab-name" ondblclick="renameBoard(event,'${b.id}')">${b.name}</span>
        <span class="tab-count">${b.sites.length}</span>
        ${state.boards.length > 1 ? `<span class="tab-delete" onclick="deleteBoard(event,'${b.id}')">×</span>` : ''}
      </button>`).join('');
  }

  // ── Render grid ──
  function renderGrid() {
    const board = activeBoard();
    const main = document.getElementById('main');
    if (!board || board.sites.length === 0) {
      main.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="1" y="1" width="9" height="9" rx="2" stroke="#444" stroke-width="1.5"/><rect x="12" y="1" width="9" height="9" rx="2" stroke="#444" stroke-width="1.5"/><rect x="1" y="12" width="9" height="9" rx="2" stroke="#444" stroke-width="1.5"/><rect x="12" y="12" width="9" height="9" rx="2" stroke="#444" stroke-width="1.5"/></svg>
          </div>
          <h2>No sites yet</h2>
          <p>Add websites you find inspiring to build your collection.</p>
          <button class="btn-empty-add" onclick="openAddModal()">Add your first site</button>
        </div>`;
      return;
    }
    main.innerHTML = `<div class="grid">${board.sites.map(renderCard).join('')}</div>`;
  }

  function renderCard(site) {
    const domain = getDomain(site.url);
    const imgSrc = screenshotUrl(site.url);
    return `
      <div class="card" onclick="openPreview('${site.id}')">
        <div class="card-preview">
          <div class="preview-shimmer" id="shimmer-${site.id}"></div>
          <img class="screenshot" src="${imgSrc}" alt=""
            onload="document.getElementById('shimmer-${site.id}')?.remove()"
            onerror="showCardFallback('${site.id}','${domain}')">
        </div>
        <div class="card-footer">
          <img class="card-favicon" src="${faviconUrl(site.url)}" alt="" onerror="this.style.display='none'">
          <div class="card-info">
            <div class="card-title">${site.title || domain}</div>
            <div class="card-domain">${domain}</div>
          </div>
          <div class="card-actions" onclick="event.stopPropagation()">
            <button class="card-action-btn" title="Open site" onclick="window.open('${site.url}','_blank')">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M5 2H2a1 1 0 00-1 1v7a1 1 0 001 1h7a1 1 0 001-1V7M8 1h3m0 0v3m0-3L5 7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button class="card-action-btn delete" title="Remove" onclick="removeSite('${site.id}')">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1 1l8 8M9 1L1 9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            </button>
          </div>
        </div>
        ${site.notes ? `<div class="card-notes">${site.notes}</div>` : ''}
      </div>`;
  }

  function showCardFallback(id, domain) {
    const shimmer = document.getElementById(`shimmer-${id}`);
    if (shimmer) shimmer.remove();
    // Find the preview container for this card — locate the img's parent
    const imgs = document.querySelectorAll(`.card-preview img.screenshot`);
    imgs.forEach(img => {
      if (img.getAttribute('onerror').includes(id)) {
        img.style.display = 'none';
        const fb = document.createElement('div');
        fb.className = 'preview-fallback';
        fb.innerHTML = `
          <div class="fallback-globe">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="#555" stroke-width="1.3"/><path d="M9 2c0 0-3 3-3 7s3 7 3 7M9 2c0 0 3 3 3 7s-3 7-3 7M2 9h14" stroke="#555" stroke-width="1.3"/></svg>
          </div>
          <div class="fallback-domain">${domain}</div>`;
        img.parentNode.appendChild(fb);
      }
    });
  }

  // ── Board actions ──
  function switchBoard(id) {
    state.activeBoard = id;
    save();
    renderBoards();
    renderGrid();
  }

  function newBoard() {
    const board = { id: uid(), name: 'New board', sites: [] };
    state.boards.push(board);
    state.activeBoard = board.id;
    save();
    renderBoards();
    renderGrid();
    setTimeout(() => {
      const tabs = document.querySelectorAll('.board-tab');
      const last = tabs[tabs.length - 1];
      if (last) startRenaming(last.querySelector('.tab-name'), board.id);
    }, 50);
  }

  function renameBoard(e, id) {
    e.stopPropagation();
    startRenaming(e.target, id);
  }

  function startRenaming(el, id) {
    const current = el.textContent;
    const input = document.createElement('input');
    input.value = current;
    input.style.cssText = 'background:none;border:none;outline:none;color:var(--text);font-size:13px;font-family:Inter,sans-serif;width:90px';
    el.replaceWith(input);
    input.focus(); input.select();
    const finish = () => {
      const name = input.value.trim() || current;
      const board = state.boards.find(b => b.id === id);
      if (board) board.name = name;
      save(); renderBoards();
    };
    input.addEventListener('blur', finish);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') input.blur();
      if (e.key === 'Escape') { input.value = current; input.blur(); }
    });
  }

  function deleteBoard(e, id) {
    e.stopPropagation();
    if (!confirm('Delete this board and all its sites?')) return;
    state.boards = state.boards.filter(b => b.id !== id);
    if (state.activeBoard === id) state.activeBoard = state.boards[0].id;
    save(); renderBoards(); renderGrid();
  }

  // ── Add site ──
  function openAddModal() {
    document.getElementById('addModal').classList.add('visible');
    setTimeout(() => document.getElementById('urlInput').focus(), 100);
  }

  function closeAddModal() {
    document.getElementById('addModal').classList.remove('visible');
    ['urlInput','titleInput','notesInput'].forEach(id => document.getElementById(id).value = '');
    const btn = document.getElementById('submitBtn');
    btn.disabled = false;
    btn.textContent = 'Add site';
  }

  async function addSite() {
    let url = document.getElementById('urlInput').value.trim();
    if (!url) return;
    if (!/^https?:\/\//.test(url)) url = 'https://' + url;

    const titleInput = document.getElementById('titleInput').value.trim();
    const notes = document.getElementById('notesInput').value.trim();

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Adding…';

    let title = titleInput;

    // Auto-fetch title via Microlink if not provided
    if (!title) {
      try {
        const res = await fetch(`https://api.microlink.io?url=${encodeURIComponent(url)}`);
        const json = await res.json();
        title = json?.data?.title || getDomain(url);
      } catch {
        title = getDomain(url);
      }
    }

    const site = { id: uid(), url, title, notes, addedAt: Date.now() };
    activeBoard().sites.unshift(site);
    save();
    closeAddModal();
    renderBoards();
    renderGrid();
  }

  function removeSite(id) {
    activeBoard().sites = activeBoard().sites.filter(s => s.id !== id);
    save(); renderBoards(); renderGrid();
  }

  // ── Full preview (large screenshot) ──
  function openPreview(id) {
    const site = activeBoard().sites.find(s => s.id === id);
    if (!site) return;

    document.getElementById('previewUrlLabel').textContent = site.url;
    document.getElementById('previewVisitBtn').href = site.url;

    const wrap = document.getElementById('previewImgWrap');
    wrap.innerHTML = `<div class="preview-modal-loading"><div class="spinner"></div>Generating preview…</div>`;

    document.getElementById('previewModal').classList.add('visible');

    // Load larger screenshot
    const img = new Image();
    img.src = screenshotUrl(site.url, 1440, 900);
    img.style.cssText = 'width:100%;display:block';
    img.onload = () => { wrap.innerHTML = ''; wrap.appendChild(img); };
    img.onerror = () => {
      wrap.innerHTML = `<div class="preview-modal-loading" style="flex-direction:column;gap:12px">
        <div style="font-size:13px;color:var(--text-muted)">Preview unavailable for this site.</div>
        <a class="btn-visit-full" href="${site.url}" target="_blank" rel="noopener">Visit site anyway</a>
      </div>`;
    };
  }

  function closePreviewModal() {
    document.getElementById('previewModal').classList.remove('visible');
    document.getElementById('previewImgWrap').innerHTML = '';
  }

  function handlePreviewBackdropClick(e) {
    if (e.target === document.getElementById('previewModal')) closePreviewModal();
  }

  // ── Keyboard ──
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closePreviewModal(); closeAddModal(); }
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openAddModal(); }
  });

  document.getElementById('addModal').addEventListener('click', e => {
    if (e.target === document.getElementById('addModal')) closeAddModal();
  });

  ['urlInput','titleInput','notesInput'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') addSite(); });
  });

  // ── Init ──
  renderBoards();
  renderGrid();
</script>
</body>
</html>
